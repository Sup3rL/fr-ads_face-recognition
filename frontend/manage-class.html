<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Classes - Attendance System</title>
    <link rel="stylesheet" href="/app/css/style.css">
</head>
<body style="align-items: flex-start;">

    <div class="navbar">
        <h2>Class & Student Management</h2>
        <a href="/app/dashboard.html" class="btn-danger" style="text-decoration: none;">Back to Dashboard</a>
    </div>

    <div class="dashboard-container">
        <div class="register-layout">
            
            <div class="register-form">
                <h3>1. Select Course</h3>
                <div class="form-group">
                    <select id="courseSelect" class="form-group" style="width: 100%; padding: 12px; border-radius: 6px;">
                        <option value="">Loading courses...</option>
                    </select>
                </div>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

                <h3>2. Search Student</h3>
                <form id="searchForm">
                    <div class="form-group">
                        <label>Enter Student NIM</label>
                        <input type="text" id="searchNim" required placeholder="e.g. 1001">
                    </div>
                    <button type="submit" class="btn">Search Database</button>
                </form>
                <p id="searchError" style="color: var(--danger); display: none; margin-top: 10px;"></p>
            </div>

            <div class="register-form" id="resultCard" style="display: none; text-align: center;">
                <h3 style="color: var(--primary);">Student Found!</h3>
                <h1 id="foundName" style="margin: 10px 0;">John Doe</h1>
                <p id="foundNim" style="font-size: 18px; color: #666;">NIM: 1001</p>
                
                <button id="enrollBtn" class="btn" style="margin-top: 20px; background-color: var(--success); color: white;">
                    Add to Selected Course
                </button>
                <p id="enrollMessage" style="margin-top: 15px; font-weight: bold;"></p>
            </div>

        </div>
    </div>

    <script src="/app/js/manage-class.js"></script>
</body>
</html>
